# Chuck Norris programmer facts (Deutsch)
fact.count=82
fact.0=Alle Arrays, die Chuck Norris deklariert, sind unendlich gro\u00df, denn Chuck Norris kennt keine Grenzen.
fact.1=Chuck Norris hat keine Festplattenlatenz, weil die Festplatte wei\u00df, dass sie sich gef\u00e4lligst beeilen soll.
fact.2=Alle Browser unterst\u00fctzen die Hex-Definitionen #chuck und #norris f\u00fcr die Farben Schwarz und Blau.
fact.3=Chuck Norris kann nicht auf Gleichheit testen, denn er hat keine Gleichen.
fact.4=Chuck Norris braucht keine Garbage Collection, denn er ruft nicht .Dispose() auf, sondern .DropKick().
fact.5=Chuck Norris' erstes Programm war kill -9.
fact.6=Chuck Norris hat die Dotcom-Blase zum Platzen gebracht.
fact.7=Chuck Norris schreibt Code, der sich selbst optimiert.
fact.8=Chuck Norris kann unendlich rekursive Funktionen schreiben... und sie zur\u00fcckkehren lassen.
fact.9=Chuck Norris kann die T\u00fcrme von Hanoi in einem einzigen Zug l\u00f6sen.
fact.10=Das einzige Entwurfsmuster, das Chuck Norris kennt, ist God Object.
fact.11=Chuck Norris hat World of Warcraft durchgespielt.
fact.12=Projektmanager fragen Chuck Norris niemals nach Sch\u00e4tzungen... niemals.
fact.13=Chuck Norris benutzt keine Webstandards, denn das Web passt sich ihm an.
fact.14="Es funktioniert auf meinem Rechner" gilt bei Chuck Norris immer.
fact.15=Whiteboards sind wei\u00df, weil Chuck Norris ihnen solche Angst eingejagt hat.
fact.16=Chuck Norris' Bart kann 140 W\u00f6rter pro Minute tippen.
fact.17=Chuck Norris kann eine ganze Anwendung mit einem einzigen Assert testen.
fact.18=Chuck Norris geht nicht auf Bugjagd, denn das w\u00fcrde die M\u00f6glichkeit des Scheiterns implizieren. Er geht auf Bug-Vernichtung.
fact.19=Chuck Norris' Tastatur hat keine Strg-Taste, denn nichts kontrolliert Chuck Norris.
fact.20=Chuck Norris braucht keinen Debugger \u2013 er starrt den Bug einfach an, bis der Code gesteht.
fact.21=Chuck Norris kann auf private Methoden zugreifen.
fact.22=Chuck Norris kann eine abstrakte Klasse instanziieren.
fact.23=Chuck Norris muss das Klassen-Factory-Pattern nicht kennen. Er kann Interfaces instanziieren.
fact.24=Die Klasse Object erbt von Chuck Norris.
fact.25=F\u00fcr Chuck Norris ist NP-Hard \= O(1).
fact.26=Chuck Norris kennt die letzte Ziffer von Pi.
fact.27=Chuck Norris kann durch Null teilen.
fact.28=Chuck Norris bekommt keine Compilerfehler \u2013 die Programmiersprache \u00e4ndert sich von selbst, um sich Chuck Norris anzupassen.
fact.29=Die Programme von Chuck Norris haben keine Versionsnummern, weil er sie nur einmal schreibt. Wenn ein Benutzer einen Bug meldet oder ein Feature w\u00fcnscht, erlebt er den Sonnenuntergang nicht mehr.
fact.30=Chuck Norris glaubt nicht an Gleitkommazahlen, weil man sie auf seiner Bin\u00e4rtastatur nicht tippen kann.
fact.31=Chuck Norris hat das Problem des Handlungsreisenden in O(1) gel\u00f6st.
fact.32=Chuck Norris bekommt nie einen Syntaxfehler. Stattdessen bekommt die Sprache einen DoesNotConformToChuck-Fehler.
fact.33=Keine Anweisung kann die ChuckNorrisException abfangen.
fact.34=Chuck Norris programmiert nicht mit einer Tastatur. Er starrt den Computer an, bis er tut, was er will.
fact.35=Chuck Norris macht kein Pair Programming.
fact.36=Chuck Norris kann Multithread-Anwendungen mit einem einzigen Thread schreiben.
fact.37=Es gibt keine Esc-Taste auf Chuck Norris' Tastatur, denn niemand entkommt Chuck Norris.
fact.38=Chuck Norris l\u00f6scht keine Dateien \u2013 er fegt sie weg.
fact.39=Chuck Norris kann eine Bin\u00e4rsuche auf unsortierten Daten durchf\u00fchren.
fact.40=Chuck Norris knackt RSA-128-Bit-Verschl\u00fcsselung in Millisekunden.
fact.41=Chuck Norris ist aus einer Endlosschleife ausgebrochen.
fact.42=Chuck Norris kann alle verschl\u00fcsselten Daten lesen, denn nichts kann sich vor Chuck Norris verstecken.
fact.43=Chuck Norris' Hosting garantiert 101% Verf\u00fcgbarkeit.
fact.44=Wenn ein Bug Chuck Norris sieht, flieht er schreiend vor Angst und zerst\u00f6rt sich sofort selbst, um einem Roundhouse-Kick zu entgehen.
fact.45=Chuck Norris hat die Google-Suchmaschine von Grund auf neu geschrieben.
fact.46=Chuck Norris braucht keine Cloud, um seine Anwendungen zu skalieren \u2013 er benutzt seinen Laptop.
fact.47=Chuck Norris kann von der UI aus auf die Datenbank zugreifen.
fact.48=Chuck Norris' Protokolldesign hat keine Zust\u00e4nde, Anfragen oder Antworten \u2013 nur Befehle.
fact.49=Chuck Norris' Programme belegen 150% der CPU, selbst wenn sie nicht ausgef\u00fchrt werden.
fact.50=Chuck Norris kann Threads erzeugen, die fertig sind, bevor sie gestartet wurden.
fact.51=Chuck Norris' Programme akzeptieren keine Eingaben.
fact.52=Chuck Norris braucht kein Betriebssystem.
fact.53=Chuck Norris kann Syntaxfehler kompilieren.
fact.54=Chuck Norris komprimiert seine Dateien mit einem fliegenden Roundhouse-Kick gegen die Festplatte.
fact.55=Chuck Norris benutzt keinen Computer, denn ein Computer macht alles langsamer als Chuck Norris.
fact.56=Du deaktivierst nicht das Chuck-Norris-Plugin \u2013 es deaktiviert dich.
fact.57=Chuck Norris braucht keinen Java-Compiler \u2013 er geht direkt zum .war.
fact.58=Chuck Norris kann GOTO so oft benutzen, wie er will. Ihm das Gegenteil zu sagen, gilt als gef\u00e4hrlich.
fact.59=An Chuck Norris' Ausdr\u00fccken ist nichts Regul\u00e4res.
fact.60=Quantenkryptografie funktioniert bei Chuck Norris nicht. Wenn etwas von Chuck beobachtet wird, bleibt es im selben Zustand, bis er fertig ist.
fact.61=Es hat keinen Sinn, Chuck Norris' Exceptions abzufangen \u2013 jeder einzelne Wurf von ihm ist t\u00f6dlich.
fact.62=Chuck Norris' Bart ist immutable.
fact.63=Chuck Norris' bevorzugte IDE ist hexedit.
fact.64=Chuck Norris ist immutable. Wenn sich etwas \u00e4ndern muss, dann der Rest des Universums.
fact.65=Chuck Norris' Additionsoperator ist nicht kommutativ \u2013 er teleportiert sich dorthin, wo Chuck ihn braucht.
fact.66=Anonyme Methoden und anonyme Typen hei\u00dfen in Wirklichkeit alle Chuck Norris. Sie prahlen nur nicht gerne damit.
fact.67=Chuck Norris hat keine Performance-Engp\u00e4sse. Er l\u00e4sst einfach das Universum warten, bis es dran ist.
fact.68=Chuck Norris verwendet beim Programmieren keine Exceptions. Er hat keinen Teil seines Codes gefunden, der nicht au\u00dfergew\u00f6hnlich ist.
fact.69=Wenn Chuck Norris' Code nicht kompiliert, entschuldigt sich der Compiler.
fact.70=Chuck Norris verwendet keine Versionsverwaltung. Keiner seiner Codes musste jemals \u00fcberarbeitet werden.
fact.71=Chuck Norris kann \u03c0 auswendig aufsagen. R\u00fcckw\u00e4rts.
fact.72=Wenn Chuck Norris auf null zeigt, zittert null vor Angst.
fact.73=Chuck Norris hat Root-Zugriff auf dein System.
fact.74=Wenn Chuck Norris einer Methode ein Argument gibt, verliert die Methode.
fact.75=Chuck Norris' Tastatur hat keine F1-Taste \u2013 der Computer bittet ihn um Hilfe.
fact.76=Chuck Norris ist zu hart f\u00fcr Soft Deletes.
fact.77=Chuck Norris macht keine Burn-Down-Charts \u2013 er macht Smack-Down-Charts.
fact.78=Chuck Norris kann den Papierkorb l\u00f6schen.
fact.79=Wenn Chuck Norris Strg+Alt+Entf dr\u00fcckt, wird ein weltweiter Neustart aller Computer eingeleitet.
fact.80=Wenn Chuck Norris Exceptions wirft, wirft er sie quer durch den Raum.
fact.81=Wenn Chuck Norris im Internet surft, bekommen Webseiten die Meldung "Warnung\: Internet Explorer hat festgestellt, dass dieser Benutzer b\u00f6sartig oder gef\u00e4hrlich ist. Fortfahren?".
